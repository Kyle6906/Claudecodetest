<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 24px;
    }

    h1 {
      font-size: 2.5rem;
      letter-spacing: 4px;
      color: #e94560;
    }

    #mode-select {
      display: flex;
      gap: 12px;
    }

    .mode-btn {
      padding: 10px 22px;
      border: 2px solid #e94560;
      background: transparent;
      color: #eee;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.95rem;
      transition: background 0.2s, color 0.2s;
    }

    .mode-btn.active, .mode-btn:hover {
      background: #e94560;
      color: #fff;
    }

    #status {
      font-size: 1.2rem;
      min-height: 1.6em;
      color: #a8dadc;
      font-weight: 600;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }
    .cell.win { background: #0f3460; animation: pulse 0.4s ease; }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    #scores {
      display: flex;
      gap: 32px;
      font-size: 1rem;
    }

    .score-box {
      text-align: center;
      background: #16213e;
      padding: 10px 20px;
      border-radius: 10px;
      min-width: 80px;
    }

    .score-box span {
      display: block;
      font-size: 1.8rem;
      font-weight: 700;
      color: #e94560;
    }

    .score-box.o-score span { color: #a8dadc; }
    .score-box.tie-score span { color: #888; }

    #reset-btn {
      padding: 12px 32px;
      background: #e94560;
      border: none;
      color: #fff;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    #reset-btn:hover { background: #c73652; transform: scale(1.04); }
  </style>
</head>
<body>

<h1>TIC TAC TOE</h1>

<div id="mode-select">
  <button class="mode-btn active" onclick="setMode('pvp')">2 Players</button>
  <button class="mode-btn" onclick="setMode('cpu')">vs Computer</button>
</div>

<div id="status">X's turn</div>

<div id="board"></div>

<div id="scores">
  <div class="score-box">X <span id="score-x">0</span></div>
  <div class="score-box tie-score">Ties <span id="score-tie">0</span></div>
  <div class="score-box o-score">O <span id="score-o">0</span></div>
</div>

<button id="reset-btn" onclick="resetGame()">New Game</button>

<script>
  const WINS = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  let board, current, gameOver, mode;
  let scores = { X: 0, O: 0, T: 0 };

  function setMode(m) {
    mode = m;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    resetGame();
  }

  function init() {
    mode = mode || 'pvp';
    board = Array(9).fill('');
    current = 'X';
    gameOver = false;
    renderBoard();
    setStatus("X's turn");
  }

  function renderBoard() {
    const el = document.getElementById('board');
    el.innerHTML = '';
    board.forEach((val, i) => {
      const cell = document.createElement('div');
      cell.className = 'cell' + (val ? ` ${val.toLowerCase()} taken` : '');
      cell.textContent = val;
      cell.onclick = () => handleClick(i);
      el.appendChild(cell);
    });
  }

  function handleClick(i) {
    if (gameOver || board[i]) return;
    place(i, current);
    if (!gameOver && mode === 'cpu' && current === 'O') {
      setTimeout(cpuMove, 350);
    }
  }

  function place(i, player) {
    board[i] = player;
    renderBoard();
    const win = checkWin(player);
    if (win) {
      highlight(win);
      scores[player]++;
      updateScores();
      setStatus(`${player} wins!`);
      gameOver = true;
    } else if (board.every(c => c)) {
      scores.T++;
      updateScores();
      setStatus("It's a tie!");
      gameOver = true;
    } else {
      current = current === 'X' ? 'O' : 'X';
      setStatus(`${current}'s turn`);
    }
  }

  function checkWin(player) {
    return WINS.find(line => line.every(i => board[i] === player)) || null;
  }

  function highlight(line) {
    const cells = document.querySelectorAll('.cell');
    line.forEach(i => cells[i].classList.add('win'));
  }

  function cpuMove() {
    if (gameOver) return;
    const i = getBestMove();
    place(i, 'O');
  }

  function getBestMove() {
    // Win if possible
    for (let i = 0; i < 9; i++) {
      if (!board[i]) {
        board[i] = 'O';
        if (checkWin('O')) { board[i] = ''; return i; }
        board[i] = '';
      }
    }
    // Block player
    for (let i = 0; i < 9; i++) {
      if (!board[i]) {
        board[i] = 'X';
        if (checkWin('X')) { board[i] = ''; return i; }
        board[i] = '';
      }
    }
    // Take center
    if (!board[4]) return 4;
    // Take a corner
    const corners = [0,2,6,8].filter(i => !board[i]);
    if (corners.length) return corners[Math.floor(Math.random() * corners.length)];
    // Take any open
    const open = board.map((v,i) => v ? null : i).filter(v => v !== null);
    return open[Math.floor(Math.random() * open.length)];
  }

  function setStatus(msg) {
    document.getElementById('status').textContent = msg;
  }

  function updateScores() {
    document.getElementById('score-x').textContent = scores.X;
    document.getElementById('score-o').textContent = scores.O;
    document.getElementById('score-tie').textContent = scores.T;
  }

  function resetGame() { init(); }

  init();
</script>
</body>
</html>
